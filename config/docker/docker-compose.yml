name: veomuse

services:
  veomuse-redis:
    image: redis:alpine
    restart: always
    command: redis-server --port 46379 --save 60 1 --loglevel warning
    expose:
      - "46379"

  veomuse-backend:
    build:
      context: ../..
      dockerfile: config/docker/backend.Dockerfile
    env_file:
      - ../../.env
    environment:
      - NODE_ENV=production
      - REDIS_HOST=veomuse-redis
      - REDIS_PORT=46379
      - PORT=33117
      - UPLOADS_PATH=/app/uploads
      - VEOMUSE_DB_PATH=/app/data/veomuse.sqlite
      - DB_AUTO_REPAIR=true
      - DB_HEALTHCHECK_INTERVAL_MS=0
    depends_on:
      - veomuse-redis
    restart: always
    volumes:
      - ../../uploads:/app/uploads
      - ../../data:/app/data
    expose:
      - "33117"

  veomuse-frontend:
    build:
      context: ../..
      dockerfile: config/docker/frontend.Dockerfile
    ports:
      - "18081:18081"
    depends_on:
      - veomuse-backend
    restart: always

networks:
  default:
    name: veomuse-network
