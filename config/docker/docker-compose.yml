services:
  veomuse-redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: always
    command: redis-server --save 60 1 --loglevel warning

  veomuse-backend:
    build:
      context: ../..
      dockerfile: config/docker/backend.Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ../../.env
    environment:
      - NODE_ENV=production
      - REDIS_HOST=veomuse-redis
      - REDIS_PORT=6379
      - PORT=3001 # 显式设置端口
    depends_on:
      - veomuse-redis
    restart: always
    volumes:
      - ../../uploads:/app/uploads

  veomuse-frontend:
    build:
      context: ../..
      dockerfile: config/docker/frontend.Dockerfile
    ports:
      - "80:80"
    depends_on:
      - veomuse-backend
    restart: always

networks:
  default:
    name: veomuse-network
