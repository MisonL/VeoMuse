title = "veomuse-gitleaks-config"

[extend]
useDefault = true

[[allowlists]]
description = "VeoMuse test placeholders"
regexes = [
  '''(?i)(replace-with-strong-password|veomuse-redis-change-me|unit-test-admin-token|unit-admin-token|mock-token|stress-key|org-level-key|org-b-only-key|workspace-key|org-openai-compatible-key|workspace-openai-compatible-key|Passw0rd!123)'''
]
paths = [
  '''^tests/helpers/auth\.ts$''',
  '''^tests/model_channels\.test\.ts$''',
  '''^tests/multi_tenant_channel_api\.test\.ts$''',
  '''^scripts/mixed_runtime_stress\.ts$'''
]
