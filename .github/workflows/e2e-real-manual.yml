name: Manual · Real E2E Regression

on:
  workflow_dispatch:

jobs:
  e2e-real:
    name: Real E2E Regression
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      E2E_REAL_CHANNELS: ${{ vars.E2E_REAL_CHANNELS }}
      GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate real channel env guards
        id: guard
        run: |
          enabled=true
          reason=""

          if [ "${E2E_REAL_CHANNELS}" != "true" ]; then
            enabled=false
            reason="E2E_REAL_CHANNELS!=true"
          fi

          if [ -z "${GEMINI_API_KEYS}" ]; then
            enabled=false
            if [ -n "${reason}" ]; then
              reason="${reason}; GEMINI_API_KEYS is empty"
            else
              reason="GEMINI_API_KEYS is empty"
            fi
          fi

          echo "enabled=${enabled}" >> "$GITHUB_OUTPUT"
          echo "reason=${reason}" >> "$GITHUB_OUTPUT"

          if [ "${enabled}" = "true" ]; then
            echo "Real e2e guard passed."
            exit 0
          fi

          echo "Manual run blocked: ${reason}"
          exit 1
      - name: Guard decision
        if: ${{ steps.guard.outputs.enabled != 'true' }}
        run: |
          echo "Skip reason: ${{ steps.guard.outputs.reason }}"

      - name: Install Playwright Chromium
        if: ${{ steps.guard.outputs.enabled == 'true' }}
        run: bunx playwright install --with-deps chromium

      - name: Run real regression e2e
        if: ${{ steps.guard.outputs.enabled == 'true' }}
        run: bun run e2e:regression:real -- --workers=1

      - name: Upload Playwright report
        if: ${{ !cancelled() && steps.guard.outputs.enabled == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: e2e-real-playwright-report
          path: |
            playwright-report/
            test-results/playwright/
          if-no-files-found: error
          retention-days: 14
