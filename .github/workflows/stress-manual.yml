name: Manual · Collaboration WS Stress

on:
  workflow_dispatch:

jobs:
  stress:
    name: Collaboration WS Stress
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run collaboration WS stress
        run: |
          mkdir -p artifacts
          bun run stress:collab-ws | tee artifacts/stress-collab-ws.log

      - name: Upload stress artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: stress-artifacts
          path: |
            artifacts/stress-collab-ws.log
            artifacts/stress*
            artifacts/*.log
          if-no-files-found: warn
          retention-days: 14
