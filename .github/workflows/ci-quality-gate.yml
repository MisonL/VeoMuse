name: CI Quality Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  gate:
    name: Typecheck + Build + E2E Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck shared/backend/frontend
        run: |
          bun run --cwd packages/shared lint
          bun run --cwd apps/backend lint
          bun run --cwd apps/frontend lint

      - name: Build
        run: bun run build

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Run Playwright smoke suite
        run: bun run e2e:smoke

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/playwright/
          retention-days: 14
