name: CI Quality Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  gate:
    name: Unified Release Gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Run unified release gate (PR soft / main hard)
        env:
          RELEASE_SLO_MODE: ${{ github.ref == 'refs/heads/main' && 'hard' || 'soft' }}
          SLO_GATE_API_BASE: http://127.0.0.1:33118
          SLO_GATE_OUTPUT: artifacts/slo-report.json
          SLO_GATE_MIN_NON_AI_SAMPLES: '20'
          SLO_GATE_MIN_JOURNEY_SAMPLES: '10'
          SLO_ADMIN_SEED_ENABLED: 'true'
          PLAYWRIGHT_API_BASE_URL: http://127.0.0.1:33118
          PLAYWRIGHT_REUSE_EXISTING_SERVER: 'true'
          ADMIN_TOKEN: ci-admin-token
        run: |
          mkdir -p artifacts
          PORT=33118 bun run --cwd apps/backend dev > artifacts/backend-slo.log 2>&1 &
          BACKEND_PID=$!

          cleanup() {
            kill "${BACKEND_PID}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:33118/api/health >/dev/null; then
              break
            fi
            sleep 1
          done

          if ! curl -fsS http://127.0.0.1:33118/api/health >/dev/null; then
            echo "backend failed to start for slo-gate"
            tail -n 200 artifacts/backend-slo.log || true
            exit 1
          fi

          curl -fsS -X POST http://127.0.0.1:33118/api/admin/slo/seed \
            -H "x-admin-token: ${ADMIN_TOKEN}" \
            -H "content-type: application/json" \
            -d '{"nonAiSamples":20,"journeySamples":10,"source":"ci"}' \
            > artifacts/slo-seed.json

          curl -fsS http://127.0.0.1:33118/api/channel/providers >/dev/null || true
          bun run release:gate

      - name: Generate quality summary artifact
        if: ${{ always() }}
        run: |
          mkdir -p artifacts
          if [ ! -f artifacts/quality-summary.json ]; then
            cat > artifacts/quality-summary.json <<EOF
            {
              "workflow": "CI Quality Gate",
              "entry": "bun run release:gate",
              "releaseSloMode": "${{ github.ref == 'refs/heads/main' && 'hard' || 'soft' }}",
              "jobStatus": "${{ job.status }}",
              "ref": "${{ github.ref }}",
              "sha": "${{ github.sha }}",
              "fallback": true
            }
            EOF
          fi

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-artifacts
          path: |
            playwright-report/
            test-results/playwright/
            artifacts/slo-report.json
            artifacts/slo-seed.json
            artifacts/backend-slo.log
            artifacts/quality-summary.json
          if-no-files-found: error
          retention-days: 14
