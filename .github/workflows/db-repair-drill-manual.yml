name: Manual · DB Repair Drill

on:
  workflow_dispatch:

jobs:
  drill:
    name: DB Repair Drill
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run DB repair drill
        run: |
          mkdir -p artifacts
          bun run drill:db-repair | tee artifacts/db-repair-drill.log

      - name: Upload drill artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: db-repair-drill-artifacts
          path: |
            data/drills/
            artifacts/db-repair-drill.log
            artifacts/*.log
          if-no-files-found: warn
          retention-days: 14
